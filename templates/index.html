<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cutting Stock Calculator</title>
    <style>
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --success: #22c55e;
            --success-hover: #16a34a;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --header-bg: linear-gradient(135deg, #431407 0%, #7c2d12 100%);
            --subtext: #94a3b8;
            --input-bg: #0f172a;
            --danger: #ef4444;
        }

        html[data-theme="light"],
        body[data-theme="light"] {
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --subtext: #64748b;
            --input-bg: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.2s, color 0.2s;
        }

        header {
            background: var(--header-bg);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--subtext);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        /* Fixed Parts Matrix grid - no text cutting */
        .parts-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr 0.8fr auto;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .parts-row span {
            color: var(--subtext);
            font-weight: bold;
            text-align: center;
        }

        .parts-row .btn-remove {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-success {
            background: var(--success);
            margin-top: 15px;
        }

        .btn-success:hover {
            background: var(--success-hover);
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Mobile optimization */
        @media (max-width: 500px) {
            .parts-row {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 8px;
                background: rgba(0, 0, 0, 0.1);
                padding: 12px;
                border-radius: 8px;
                border: 1px dashed var(--border);
            }
            .parts-row span {
                display: none; /* Hide 'x' on mobile to save space */
            }
            .parts-row .btn-remove {
                grid-column: span 3; /* Full width remove button on mobile */
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>

    <header>
        <h1>Pro Cutting Stock Calculator</h1>
        <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 0.9rem;">Material Optimization Engine</p>
    </header>

    <div class="container">
        <form action="/optimize" method="POST">
            <div class="panel">
                <h3>Material Config</h3>
                <div class="input-group">
                    <label>Material Type</label>
                    <select name="material_type">
                        <option value="MDF">MDF (Medium Density Fiberboard)</option>
                        <option value="Plywood">Plywood</option>
                        <option value="Chipboard">Chipboard</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Sheet Width (mm)</label>
                    <input type="number" name="sheet_width" value="2440" required>
                </div>
                <div class="input-group">
                    <label>Sheet Height (mm)</label>
                    <input type="number" name="sheet_height" value="1220" required>
                </div>
                <div class="input-group">
                    <label>Blade Kerf / Waste (mm)</label>
                    <input type="number" name="blade_kerf" value="4" required>
                </div>
            </div>

            <div class="panel">
                <h3>Parts Matrix</h3>
                <div id="parts-container">
                    <div class="parts-row">
                        <input type="number" name="part_width[]" placeholder="Width (mm)" required>
                        <span>×</span>
                        <input type="number" name="part_height[]" placeholder="Height (mm)" required>
                        <input type="number" name="part_qty[]" placeholder="Qty" required>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                    </div>
                </div>
                
                <button type="button" class="btn" style="margin-top: 10px; background: transparent; color: var(--primary); border: 1px solid var(--primary);" onclick="addPartRow()">+ Add Part</button>
            </div>

            <button type="submit" class="btn btn-success">Optimize Layout Map</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
        }

        function addPartRow() {
            const container = document.getElementById('parts-container');
            const newRow = document.createElement('div');
            newRow.className = 'parts-row';
            newRow.innerHTML = `
                <input type="number" name="part_width[]" placeholder="Width (mm)" required>
                <span>×</span>
                <input type="number" name="part_height[]" placeholder="Height (mm)" required>
                <input type="number" name="part_qty[]" placeholder="Qty" required>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(newRow);
        }
    </script>
</body>
</html>
