<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cutting Stock Calculator</title>
    <style>
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --success: #22c55e;
            --success-hover: #16a34a;
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --header-bg: linear-gradient(135deg, #431407 0%, #7c2d12 100%);
            --subtext: #64748b;
            --input-bg: #f8fafc;
        }

        html[data-theme="dark"],
        body[data-theme="dark"] {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --header-bg: linear-gradient(135deg, #1c0a05 0%, #2c1007 100%);
            --subtext: #94a3b8;
            --input-bg: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.2s, color 0.2s;
        }

        header {
            background: var(--header-bg);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        /* Main layout container - flexible and responsive */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Configuration panels and cards */
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }

        /* Form input fields wrapper */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--subtext);
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        /* Parts Matrix rows - wraps automatically on mobile screens */
        .parts-row {
            display: flex;
            flex-wrap: wrap; 
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .parts-row input {
            flex: 1;
            min-width: 80px; 
        }

        .parts-row .btn-remove {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Standard buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: var(--success-hover);
        }

        /* Theme switch button */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        html[data-theme="dark"] .theme-toggle {
            background: rgba(0, 0, 0, 0.3);
        }

        /* Mobile layout overrides */
        @media (max-width: 600px) {
            header {
                padding: 35px 15px 15px 15px; 
            }
            .parts-row {
                background: var(--bg);
                padding: 10px;
                border-radius: 8px;
                border: 1px dashed var(--border);
            }
            .parts-row input[placeholder="Qty"] {
                flex: 1;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>

    <header>
        <h1>Pro Cutting Stock Calculator</h1>
        <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 0.9rem;">Material Optimization Engine</p>
    </header>

    <div class="container">
        <div class="panel">
            <h3>Material Config</h3>
            <div class="input-group">
                <label>Material Type</label>
                <select>
                    <option>MDF (Medium Density Fiberboard)</option>
                    <option>Plywood</option>
                    <option>Chipboard</option>
                </select>
            </div>
            <div class="input-group">
                <label>Sheet Width (mm)</label>
                <input type="number" value="2440">
            </div>
            <div class="input-group">
                <label>Sheet Height (mm)</label>
                <input type="number" value="1220">
            </div>
            <div class="input-group">
                <label>Blade Kerf / Waste (mm)</label>
                <input type="number" value="4">
            </div>
        </div>

        <div class="panel">
            <h3>Parts Matrix</h3>
            <div id="parts-container">
                <div class="parts-row">
                    <input type="number" placeholder="Width (mm)">
                    <span>×</span>
                    <input type="number" placeholder="Height (mm)">
                    <input type="number" placeholder="Qty">
                    <button class="btn-remove">✕</button>
                </div>
            </div>
            
            <button class="btn" style="margin-top: 10px; background: transparent; color: var(--primary); border: 1px solid var(--primary);" onclick="addPartRow()">+ Add Part</button>
        </div>

        <button class="btn btn-success">Optimize Layout Map</button>
    </div>

    <script>
        // Dark/Light theme toggle mechanism
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
        }

        // Dynamically add new item rows to the matrix
        function addPartRow() {
            const container = document.getElementById('parts-container');
            const newRow = document.createElement('div');
            newRow.className = 'parts-row';
            newRow.innerHTML = `
                <input type="number" placeholder="Width (mm)">
                <span>×</span>
                <input type="number" placeholder="Height (mm)">
                <input type="number" placeholder="Qty">
                <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(newRow);
        }
    </script>
</body>
</html>
