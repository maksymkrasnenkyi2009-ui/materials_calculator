<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cutting Stock Calculator</title>
    <style>
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --success: #22c55e;
            --success-hover: #16a34a;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --header-bg: linear-gradient(135deg, #431407 0%, #7c2d12 100%);
            --subtext: #94a3b8;
            --input-bg: #0f172a;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }

        header {
            background: var(--header-bg);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel h3 { margin: 0 0 15px 0; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--subtext); }

        input, select {
            width: 100%; padding: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            border-radius: 6px; font-size: 1rem; outline: none;
        }

        /* Responsive grid that adapts to any screen width */
        .parts-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr 0.8fr auto;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .parts-row span { color: var(--subtext); }
        .btn-remove {
            background: var(--danger); color: white; border: none;
            padding: 12px; border-radius: 6px; cursor: pointer;
        }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 14px 20px; font-size: 1rem; font-weight: 600;
            border-radius: 6px; cursor: pointer; width: 100%;
        }

        .btn-success { background: var(--success); margin-top: 15px; }

        /* Smartphone layout override */
        @media (max-width: 500px) {
            .parts-row {
                grid-template-columns: 1fr 1fr 1fr;
                background: rgba(0, 0, 0, 0.2);
                padding: 10px; border-radius: 8px;
            }
            .parts-row span { display: none; }
            .parts-row .btn-remove { grid-column: span 3; padding: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pro Cutting Stock Calculator</h1>
    </header>

    <div class="container">
        <form action="/optimize" method="POST">
            <div class="panel">
                <h3>Material Config</h3>
                <div class="input-group">
                    <label>Material Type</label>
                    <select name="material_type">
                        <option value="MDF">MDF</option>
                        <option value="Plywood">Plywood</option>
                        <option value="Chipboard">Chipboard</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Sheet Width (mm)</label>
                    <input type="number" name="sheet_width" value="2440" required>
                </div>
                <div class="input-group">
                    <label>Sheet Height (mm)</label>
                    <input type="number" name="sheet_height" value="1220" required>
                </div>
                <div class="input-group">
                    <label>Blade Kerf / Waste (mm)</label>
                    <input type="number" name="blade_kerf" value="4" required>
                </div>
            </div>

            <div class="panel">
                <h3>Parts Matrix</h3>
                <div id="parts-container">
                    <div class="parts-row">
                        <input type="number" name="part_width[]" placeholder="Width (mm)" required>
                        <span>×</span>
                        <input type="number" name="part_height[]" placeholder="Height (mm)" required>
                        <input type="number" name="part_qty[]" placeholder="Qty" required>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                    </div>
                </div>
                <button type="button" class="btn" style="margin-top:10px; background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="addPartRow()">+ Add Part</button>
            </div>

            <button type="submit" class="btn btn-success">Optimize Layout Map</button>
        </form>
    </div>

    <script>
        function addPartRow() {
            const container = document.getElementById('parts-container');
            const newRow = document.createElement('div');
            newRow.className = 'parts-row';
            newRow.innerHTML = `
                <input type="number" name="part_width[]" placeholder="Width (mm)" required>
                <span>×</span>
                <input type="number" name="part_height[]" placeholder="Height (mm)" required>
                <input type="number" name="part_qty[]" placeholder="Qty" required>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(newRow);
        }
    </script>
</body>
</html>
